<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Extracciones</title>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <link rel="stylesheet" href="./css/extracciones.css">

</head>

<body>


    <div class="header">
        <h2>Extracciones</h2>
        <button onclick="logout()">Salir</button>
    </div>

    <div id="usuarioVista" class="vista activa">

        <div class="scanner">
            <h3>Escaneo</h3>

            <button onclick="activarQR()">
                Escanear QR
            </button>

            <div id="reader"></div>
        </div>


    </div>

    <div id="zonas">
        <p>Escaneá un QR para ver las máquinas</p>
        <button onclick="enviarWhatsApp()">
            Enviar pendientes
        </button>
    </div>
    </div>


    <script>

        let datos = [];
        let datosCargados = false;

        let maquinaSeleccionada = null;
        let fallasPorMaquina = {};

        // =====================
        // CARGA DATOS
        // =====================
        fetch("/api/turno")
            .then(res => res.json())
            .then(data => {
                datos = data || [];
                datosCargados = true;
                console.log("Datos cargados:", datos.length);
            })
            .catch(err => {
                console.error(err);
                alert("Error cargando datos");
            });

        // =====================
        // LOGOUT
        // =====================
        function logout() {
            localStorage.removeItem("usuarioActivo");
            window.location.href = "index.html";
        }

        // =====================
        // QR
        // =====================
        function activarQR() {

            const readerDiv = document.getElementById("reader");
            readerDiv.innerHTML = "";

            Html5Qrcode.getCameras().then(cameras => {

                if (!cameras.length) {
                    alert("No hay cámara disponible");
                    return;
                }

                const html5QrCode = new Html5Qrcode("reader");

                const camara =
                    cameras.find(c => c.label.toLowerCase().includes("back")) || cameras[0];

                html5QrCode.start(
                    camara.id,
                    { fps: 10, qrbox: 250 },
                    function (decodedText) {
                        html5QrCode.stop();
                        procesarQR(decodedText);
                    }
                );

            }).catch(err => {
                alert("Error cámara");
                console.error(err);
            });
        }

        // =====================
        // PROCESAR QR
        // =====================
        function procesarQR(locacion) {

            if (!datosCargados) {
                document.getElementById("zonas").innerHTML = "<p>Cargando datos...</p>";
                return;
            }

            const buscada = String(locacion).replace(/\D/g, "").trim();

            const resultado = datos.filter(
                d => String(d.location).replace(/\D/g, "").trim() === buscada
            );

            if (!resultado.length) {
                document.getElementById("zonas").innerHTML = "<p>Locación no encontrada</p>";
                return;
            }

            mostrarLocacion(buscada, resultado);
        }

        // =====================
        // MOSTRAR LOCACION
        // =====================
        function mostrarLocacion(locacion, lista) {

            const contenedor = document.getElementById("zonas");

            const zona = lista[0].zona;

            contenedor.innerHTML = `
        <h3>Locación ${locacion}</h3>
        <h4>Zona ${zona}</h4>
        <h4>Cantidad de máquinas: ${lista.length}</h4>

        <div class="tabla">
            <div class="fila encabezado">
                <div>#</div>
                <div>Máquina</div>
                <div>✔️</div>
                <div>❌</div>
            </div>
        </div>
    `;

            const tabla = contenedor.querySelector(".tabla");

            lista.forEach((m, index) => {

                const fila = document.createElement("div");
                fila.classList.add("fila");

                fila.innerHTML = `
            <div>${index + 1}</div>
            <div>${m.maquina}</div>
            <div><input type="checkbox" class="ok"></div>
            <div><input type="checkbox" class="fail"></div>
        `;

                tabla.appendChild(fila);

                // =====================
                // ❌ ABRIR MODAL
                // =====================
                const fail = fila.querySelector(".fail");

                fail.addEventListener("change", () => {

                    if (fail.checked) {
                        maquinaSeleccionada = fila.children[1].innerText;
                        document.getElementById("modalMotivos").style.display = "flex";
                    }

                });
            });
        }

        // =====================
        // CONFIRMAR FALLA
        // =====================
        function confirmarFalla() {

            const checks = document.querySelectorAll("#modalMotivos input:checked");

            const motivos = [];

            checks.forEach(c => {
                motivos.push(c.parentElement.innerText.trim());
            });

            if (maquinaSeleccionada) {
                fallasPorMaquina[maquinaSeleccionada] = motivos;
            }

            document.querySelectorAll("#modalMotivos input").forEach(i => i.checked = false);

            document.getElementById("modalMotivos").style.display = "none";

            console.log("Fallas guardadas:", fallasPorMaquina);
        }

        // =====================
        // WHATSAPP
        // =====================
        function enviarWhatsApp() {

            let mensaje = "";

            const filas = document.querySelectorAll(".fila");

            filas.forEach(fila => {

                const maquina = fila.children[1].innerText;

                if (fallasPorMaquina[maquina]) {

                    mensaje += `❌ Máquina ${maquina}\n`;

                    fallasPorMaquina[maquina].forEach(m => {
                        mensaje += `- ${m}\n`;
                    });

                    mensaje += "\n";
                }
            });

            if (mensaje === "") return;

            const url = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;

            window.open(url, "_blank");

            let fallasPorMaquina = {};
            let maquinaSeleccionada = null;

            function confirmarFalla() {

                const checkboxes = document.querySelectorAll("#modalMotivos input[type='checkbox']");

                let fallas = [];

                checkboxes.forEach(cb => {
                    if (cb.checked) {
                        fallas.push(cb.parentElement.innerText.trim());
                    }
                });

                if (!maquinaSeleccionada) {
                    alert("No hay máquina seleccionada");
                    return;
                }

                fallasPorMaquina[maquinaSeleccionada] = fallas;

                console.log("Fallas guardadas:", fallasPorMaquina);

                cerrarModal();
            }
        }

        // =====================
        // COMO CERRAR MODAL
        // =====================

        function cerrarModal() {
            document.getElementById("modalMotivos").style.display = "none";

            const checkboxes = document.querySelectorAll("#modalMotivos input[type='checkbox']");
            checkboxes.forEach(cb => cb.checked = false);
        }

        // =====================
        // COMO ABRIR MODAL
        // =====================

        function abrirModal(maquina) {
            maquinaSeleccionada = maquina;

            document.getElementById("modalMotivos").style.display = "block";
        }




    </script>

    <div id="modalMotivos" class="modal">

        <div class="modal-contenido">

            <h3>Motivo de falla</h3>

            <label>
                <input type="checkbox">
                PUERTA PRINCIPAL
            </label>

            <label>
                <input type="checkbox">
                PUERTA BELLY
            </label>

            <label>
                <input type="checkbox">
                CERRADURA 3070
            </label>

            <label>
                <input type="checkbox">
                CERRADURA 020
            </label>

            <button onclick="confirmarFalla()">
                Confirmar
            </button>

        </div>

    </div>

</body>

</html>
