<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Extracciones</title>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <link rel="stylesheet" href="./css/extracciones.css">

</head>

<body>

    <h1>PRUEBA DEPLOY 999</h1>
    <div class="header">
        <h2>Extracciones</h2>
        <button onclick="logout()">Salir</button>
    </div>

    <div id="usuarioVista" class="vista activa">

        <div class="scanner">
            <h3>Escaneo</h3>

            <button onclick="activarQR()">
                Escanear QR
            </button>

            <div id="reader"></div>
        </div>


    </div>

    <div id="zonas">
        <p>Escaneá un QR para ver las máquinas</p>
    </div>
    </div>

    <button onclick='procesarQR("3002")'>
        Probar QR 3002
    </button>


    <script>


        let datos = [];
        let datosCargados = false;

        fetch("/api/turno")
            .then(res => res.json())
            .then(data => {

                datos = data || [];
                datosCargados = true;

                console.log("Datos cargados:", datos.length);

            })
            .catch(err => {

                console.error(err);
                alert("Error cargando datos");

            });

        window.onload = function () {

            const user = localStorage.getItem("usuarioActivo");

            if (!user) {
                window.location.href = "index.html";
                return;
            }

            console.log("Datos cargados:", datos.length);
        };



        // LOGOUT

        function logout() {
            localStorage.removeItem("usuarioActivo");
            window.location.href = "index.html";
        }


        // QR

        function activarQR() {

            const readerDiv = document.getElementById("reader");
            readerDiv.innerHTML = "";

            Html5Qrcode.getCameras().then(cameras => {

                if (!cameras.length) {
                    alert("No hay cámara disponible");
                    return;
                }

                const html5QrCode = new Html5Qrcode("reader");

                const camara =
                    cameras.find(c =>
                        c.label.toLowerCase().includes("back")
                    ) || cameras[0];

                html5QrCode.start(
                    camara.id,
                    { fps: 10, qrbox: 250 },

                    function (decodedText) {

                        html5QrCode.stop();

                    }

                );

            }).catch(err => {
                alert("Error cámara");
                console.error(err);
            });

        }



        // PROCESAR QR

        function procesarQR(locacion) {

            if (!datosCargados) {
                alert("Todavía cargando datos...");
                return;
            }


            alert("Datos cargados: " + datos.length);

            const buscada = Number(
                String(locacion).replace(/\D/g, "")
            );

            const resultado = datos.filter(
                d => String(d.location).trim() === String(buscada).trim()
            );


            console.log("BUSCADA:", buscada);
            console.log("PRIMEROS DATOS:", datos.slice(0, 5));

            if (!resultado.length) {
                document.getElementById("zonas").innerHTML =
                    "<p>Locación no encontrada</p>";
                return;
            }

            mostrarLocacion(buscada, resultado);
        }


        // MOSTRAR LOCACION

        function mostrarLocacion(locacion, lista) {

            const contenedor = document.getElementById("zonas");

            const zona = lista[0].zona;

            contenedor.innerHTML = `
        <h3>Locación ${locacion}</h3>
        <h4>Zona ${zona}</h4>
        <h4>Cantidad de máquinas: ${lista.length}</h4>

        <div class="tabla">
            <div class="fila encabezado">
                <div>#</div>
                <div>Máquina</div>
                <div>✔️</div>
                <div>❌</div>
            </div>
        </div>
    `;

            const tabla = contenedor.querySelector(".tabla");

            lista.forEach((m, index) => {

                const fila = document.createElement("div");
                fila.classList.add("fila");

                fila.innerHTML = `
            <div>${index + 1}</div>
            <div>${m.maquina}</div>

            <div>
                <input type="checkbox" class="ok">
            </div>

            <div>
                <input type="checkbox" class="fail">
            </div>

            <div class="motivos" style="display:none;">
                <label><input type="checkbox">PUERTA PRINCIPAL</label><br>
                <label><input type="checkbox"> PUERTA BELLY</label><br>
                <label><input type="checkbox"> CERRADURA 3070</label><br>
                <label><input type="checkbox"> CERRADURA 020</label>
            </div>
        `;

                tabla.appendChild(fila);

                // lógica ❌ → mostrar motivos
                const fail = fila.querySelector(".fail");
                const motivos = fila.querySelector(".motivos");

                fail.addEventListener("change", () => {
                    motivos.style.display = fail.checked ? "block" : "none";
                });

            });
        }

    </script>

</body>

</html>
