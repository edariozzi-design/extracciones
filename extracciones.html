<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extracciones</title>

    <!-- Excel -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <!-- QR -->
    <script src="https://unpkg.com/html5-qrcode"></script>

    <link rel="stylesheet" href="./css/extracciones.css">
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <h2>Extracciones</h2>
        <button onclick="logout()">Salir</button>
    </div>

    <!-- ADMIN -->
    <div id="admin" class="vista">
        <h3>Panel Administrador</h3>

        <input type="file" id="excelFile" accept=".xlsx">
        <br><br>

        <div id="adminPreview"></div>
    </div>

    <!-- USUARIO -->
    <div id="usuarioVista" class="vista">
        <h3>Escaneo</h3>

        <button onclick="activarQR()">📷 Escanear QR</button>

        <div id="reader" style="width:100%; max-width:300px; margin:auto;"></div>

        <div id="zonas"></div>
    </div>

    <script>

        // =====================
        // VARIABLES
        // =====================

        let datos = JSON.parse(localStorage.getItem("datos")) || [];

        // =====================
        // INICIO
        // =====================

        window.onload = function () {

            const user = localStorage.getItem("usuarioActivo");

            if (!user) {
                window.location.href = "index.html";
                return;
            }

            if (user === "admin") {
                mostrarAdmin();
            } else {
                mostrarUsuario();
            }
        };

        // =====================
        // VISTAS
        // =====================

        function ocultarTodo() {
            document.querySelectorAll(".vista").forEach(v => v.classList.remove("activa"));
        }

        function mostrarAdmin() {
            ocultarTodo();
            document.getElementById("admin").classList.add("activa");
        }

        function mostrarUsuario() {
            ocultarTodo();
            document.getElementById("usuarioVista").classList.add("activa");

            document.getElementById("zonas").innerHTML =
                "<p>Escaneá un QR para ver las máquinas</p>";
        }

        // =====================
        // LOGOUT
        // =====================

        function logout() {
            localStorage.removeItem("usuarioActivo");
            window.location.href = "index.html";
        }

        // =====================
        // ADMIN - CARGA EXCEL
        // =====================

        document.getElementById("excelFile").addEventListener("change", leerExcel);

        function leerExcel(e) {
            const file = e.target.files[0];
            const reader = new FileReader();

            reader.onload = function (evt) {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, { type: "array" });

                const hoja = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(hoja);

                datos = json;

                localStorage.setItem("datos", JSON.stringify(datos));

                mostrarPreview();
            };

            reader.readAsArrayBuffer(file);
        }

        function mostrarPreview() {
            const cont = document.getElementById("adminPreview");

            cont.innerHTML = "<h4>Vista previa</h4>";

            datos.forEach(d => {
                cont.innerHTML += `
                    <div class="card">
                        ${d["Máquina"]} | Loc ${d.Location} | Zona ${d.Zona}
                    </div>
                `;
            });
        }

        // =====================
        // QR
        // =====================

        function activarQR() {

            const readerDiv = document.getElementById("reader");
            readerDiv.innerHTML = "";

            Html5Qrcode.getCameras().then(cameras => {

                if (!cameras.length) {
                    alert("No hay cámara disponible");
                    return;
                }

                const html5QrCode = new Html5Qrcode("reader");

                const camara = cameras.find(c =>
                    c.label.toLowerCase().includes("back")
                ) || cameras[0];

                html5QrCode.start(
                    camara.id,
                    { fps: 10, qrbox: 250 },
                    (decodedText) => {

                        html5QrCode.stop();
                        procesarQR(decodedText);

                    }
                );

            }).catch(() => {
                alert("Error al acceder a la cámara");
            });
        }

        // =====================
        // PROCESAR QR
        // =====================

        function procesarQR(locacion) {

            locacion = locacion.toString().padStart(4, "0");

            if (!/^\d{4}$/.test(locacion)) {
                alert("QR inválido");
                return;
            }

            const resultado = datos.filter(d => {
                const key = Object.keys(d).find(k => k.trim() === "Location");
                const loc = (d[key] || "").toString().padStart(4, "0");
                return loc === locacion;
            });

            if (resultado.length === 0) {
                alert("Locación no encontrada");
                return;
            }

            mostrarLocacion(locacion, resultado);
        }

        // =====================
        // MOSTRAR RESULTADO
        // =====================

        function mostrarLocacion(locacion, lista) {

            const contenedor = document.getElementById("zonas");

            const zona = lista[0].Zona;

            contenedor.innerHTML = `
                <h3>Locación ${locacion}</h3>
                <h4>Zona ${zona}</h4>
            `;

            lista.forEach(m => {
                contenedor.innerHTML += `
                    <div class="maquina">
                        <strong>${m["Máquina"]}</strong><br>
                        ${m.Importe} ${m.Moneda}
                    </div>
                `;
            });
        }

    </script>

</body>

</html>
