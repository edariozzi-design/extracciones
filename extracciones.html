<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Extracciones</title>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <link rel="stylesheet" href="./css/extracciones.css">

</head>

<body>

    <h1>PRUEBA DEPLOY 999</h1>
    <div class="header">
        <h2>Extracciones</h2>
        <button onclick="logout()">Salir</button>
    </div>

    <div id="usuarioVista" class="vista activa">

        <div class="scanner">
            <h3>Escaneo</h3>

            <button onclick="activarQR()">
                Escanear QR
            </button>

            <div id="reader"></div>
        </div>

        <div id="reader" style="width:100%; max-width:300px; margin:auto;">
        </div>

        <div id="zonas">
            <p>Escaneá un QR para ver las máquinas</p>
        </div>
    </div>

    <button onclick='procesarQR("3002")'>
        Probar QR 3002
    </button>


    <script>

        // datos vienen desde administrador.html vía localStorage
        let datos = JSON.parse(localStorage.getItem("turno")) || [];

        window.onload = function () {

            const user = localStorage.getItem("usuarioActivo");

            if (!user) {
                window.location.href = "index.html";
                return;
            }

            console.log("Datos cargados:", datos.length);
        };



        // LOGOUT

        function logout() {
            localStorage.removeItem("usuarioActivo");
            window.location.href = "index.html";
        }


        // QR

        function activarQR() {

            alert("Entró a activarQR");

            const readerDiv = document.getElementById("reader");
            readerDiv.innerHTML = "";

            const html5QrCode = new Html5Qrcode("reader");

            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: 250 },

                function (decodedText) {

                    html5QrCode.stop();

                    let locacion = String(decodedText)
                        .replace(/\D/g, "")
                        .padStart(4, "0");

                    procesarQR(locacion);
                }

            ).catch(err => {
                alert("Error al acceder cámara");
                console.error(err);
            });
        }



        // PROCESAR QR

        if (String(locacion).includes("http")) {
            alert("Este QR es una URL, no una locación");
            return;
        }

        function procesarQR(locacion) {

            alert("Locación leída: " + locacion);

            locacion = String(locacion).replace(/\D/g, '');

            alert("Primer dato location: " + datos[0].location);

            const resultado = datos.filter(function (d) {
                return String(d.location) == locacion;
            });

            alert("Match: " + resultado.length);

            if (resultado.length === 0) {
                alert("Locación no encontrada");
                return;
            }

            mostrarLocacion(locacion, resultado);
        }

        // MOSTRAR LOCACION

        function mostrarLocacion(locacion, lista) {

            const contenedor =
                document.getElementById("zonas");

            const zona = lista[0].zona;

            contenedor.innerHTML = `
        <h3>Locación ${locacion}</h3>
        <h4>Zona ${zona}</h4>
    `;


            lista.forEach(m => {

                contenedor.innerHTML += `
            <div class="maquina">
                Máquina ${m.maquina}
            </div>
        `;

            });

        }

    </script>

</body>

</html>
